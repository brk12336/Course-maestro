<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111318">
  <title>CuisineOrder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════════════════════════════════════════
     DESKTOP HEADER
════════════════════════════════════════════ -->
<header class="header">
  <a href="index.html" class="header-logo">
    <div class="logo-icon">🍕</div>
    <span class="logo-text">CuisineOrder</span>
  </a>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInputDesktop" placeholder="Rechercher un produit…">
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btnDefaultOrderDesktop">⚡ Commande type</button>
    <a href="admin.html" class="btn btn-ghost">🔒 Admin</a>
  </div>
</header>

<!-- ════════════════════════════════════════════
     MOBILE HEADER
════════════════════════════════════════════ -->
<header class="mobile-header">
  <a href="index.html" class="mobile-logo">
    <div class="mobile-logo-icon">🍕</div>
    <span class="mobile-logo-text">CuisineOrder</span>
  </a>
  <div class="mobile-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInputMobile" placeholder="Rechercher…">
  </div>
  <a href="admin.html" class="mobile-header-btn" title="Admin">🔒</a>
</header>

<!-- ════════════════════════════════════════════
     MOBILE CATEGORY CHIPS
════════════════════════════════════════════ -->
<div class="mobile-cat-chips" id="mobileCatChips">
  <!-- Generated by JS -->
</div>

<!-- ════════════════════════════════════════════
     MAIN LAYOUT (Desktop 3-col / Mobile 1-col)
════════════════════════════════════════════ -->
<div class="layout">

  <!-- Desktop Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-title">Catégories</div>
    <div id="categorySidebar"></div>
  </nav>

  <!-- Products Grid -->
  <main class="main-content">
    <h1 class="section-title">Passer une Commande</h1>
    <p class="section-sub">Ajustez les quantités puis envoyez votre commande</p>
    <div class="products-grid" id="productsGrid"></div>
  </main>

  <!-- Desktop Cart Panel -->
  <aside class="cart-panel">
    <div class="cart-header">
      <div class="cart-title">Panier <span id="cartItemsCount">0 article</span></div>
      <span class="cart-count-badge" id="cartCountDesktop">0</span>
    </div>
    <div class="cart-body" id="cartBodyDesktop"></div>
    <div class="cart-footer">
      <textarea class="cart-note" id="orderNoteDesktop" rows="2"
        placeholder="📝 Note pour le livreur (optionnel)…"></textarea>
      <div class="cart-footer-btns">
        <button class="btn btn-primary" id="btnSubmitDesktop"
          style="justify-content:center;font-size:15px;padding:13px">
          ✅ Envoyer la commande
        </button>
        <button class="btn btn-danger" id="btnClearDesktop" style="justify-content:center">
          🗑️ Vider le panier
        </button>
      </div>
    </div>
  </aside>
</div>

<!-- ════════════════════════════════════════════
     MOBILE FAB
════════════════════════════════════════════ -->
<button class="mobile-fab" id="mobileFab" aria-label="Voir le panier">
  🛒
  <span class="mobile-fab-badge" id="fabBadge" style="display:none">0</span>
</button>

<!-- ════════════════════════════════════════════
     MOBILE BOTTOM NAV
════════════════════════════════════════════ -->
<nav class="mobile-bottom-nav">
  <button class="nav-item active" id="navHome" onclick="showHomeTab()">
    <span class="nav-icon">🏠</span>
    <span class="nav-label-fr">Accueil</span>
    <span class="nav-label-bn">হোম</span>
  </button>
  <button class="nav-item nav-item-cart" id="navCart" onclick="openCartSheet()">
    <span class="nav-icon">🛒</span>
    <span class="nav-label-fr">Panier</span>
    <span class="nav-label-bn">পণ্য</span>
    <span class="nav-cart-badge" id="navCartBadge" style="display:none">0</span>
  </button>
  <button class="nav-item" onclick="loadDefaultOrder()">
    <span class="nav-icon">⚡</span>
    <span class="nav-label-fr">Type</span>
    <span class="nav-label-bn">ডিফল্ট</span>
  </button>
  <a href="admin.html" class="nav-item">
    <span class="nav-icon">🔒</span>
    <span class="nav-label-fr">Admin</span>
    <span class="nav-label-bn">অ্যাডমিন</span>
  </a>
</nav>

<!-- ════════════════════════════════════════════
     MOBILE CART BOTTOM SHEET
════════════════════════════════════════════ -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCartSheet()"></div>

<div class="cart-bottom-sheet" id="cartBottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">Panier <span id="cartItemsCountMob">0 article</span></div>
    <button class="sheet-close" onclick="closeCartSheet()">×</button>
  </div>
  <div class="sheet-body" id="cartBodyMobile"></div>
  <div class="sheet-footer">
    <textarea class="cart-note-mobile" id="orderNoteMobile" rows="2"
      placeholder="📝 Note pour le livreur…"></textarea>
    <div class="sheet-footer-btns">
      <button class="btn btn-primary" id="btnSubmitMobile"
        style="justify-content:center;font-size:15px;padding:13px">
        ✅ Envoyer la commande
      </button>
      <button class="btn btn-danger" id="btnClearMobile" style="justify-content:center">
        🗑️ Vider
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/products.js"></script>
<script src="js/app.js"></script>
</body>
</html>
